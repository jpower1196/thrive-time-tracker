<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Shared Timers</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="timer-stage" aria-labelledby="timer-title">
        <div class="brand-lockup">
          <img class="brand-logo" src="/thrive.jpg" alt="Thrive Integrative Health">
        </div>

        <div class="stage-copy">
          <h1 id="timer-title">Physiotherapy Live Timers</h1>
          <p class="stage-note">Making lives better, one calm interval at a time.</p>
        </div>

        <section class="timer-board timer-banner" aria-labelledby="timer-board-title">
          <div class="board-heading">
            <h2 id="timer-board-title">Active timers</h2>
          </div>
          <div id="timerList" class="timer-list"></div>
        </section>

      </section>

    </main>

    <script src="/app.js"></script>
  </body>
</html>
